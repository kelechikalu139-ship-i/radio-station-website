services:
  client:
    build: ./client
    container_name: nexterfm-client
    ports:
      - "5174:5174"
    volumes:
      - ./client:/app
      # - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://server:4000
    depends_on:
      - server
    restart: unless-stopped

  server:
    build: ./server
    container_name: nexterfm-server
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules            # safe for server
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=your_real_password_here
      - DB_NAME=nexter_fm_db
      - CLOUDINARY_CLOUD_NAME=dqyblbech
      - CLOUDINARY_API_KEY=371843926223381
      - CLOUDINARY_API_SECRET=iKgNlSpJZIxrFjNu7Lvu3xJeqxM
      - JWT_SECRET=supersecretkey123
      - JWT_EXPIRES_IN=7d
    restart: unless-stopped

  admin:
    build: ./admin
    container_name: nexterfm-admin
    ports:
      - "5173:5173"   
                     # ← change to "5173:5173" if admin uses Vite default port
    volumes:
      - ./admin:/app
      # - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://server:4000
    depends_on:
      - server
    restart: unless-stopped