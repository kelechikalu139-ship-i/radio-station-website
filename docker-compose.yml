services:
  client:
    build: 
      context: ./client
      cache_from:
        - nexterfm-client:latest
    container_name: nexterfm-client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:4000       # ← browser sees this → hits host port 4000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - server
    restart: unless-stopped

  server:
    build: 
      context: ./server
      cache_from:
        - nexterfm-server:latest
    container_name: nexterfm-server
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=your_real_password_here
      - DB_NAME=nexter_fm_db
      - CLOUDINARY_CLOUD_NAME=dqyblbech
      - CLOUDINARY_API_KEY=371843926223381
      - CLOUDINARY_API_SECRET=iKgNlSpJZIxrFjNu7Lvu3xJeqxM
      - JWT_SECRET=supersecretkey123
      - JWT_EXPIRES_IN=7d
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

  admin:
    build: 
      context: ./admin
      cache_from:
        - nexterfm-admin:latest
    container_name: nexterfm-admin
    ports:
      - "5174:5174"
    volumes:
      - ./admin:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:4000       # ← same change here
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - server
    restart: unless-stopped